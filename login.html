<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eva - Iniciar Sesión</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="login-card">
        <h2>Iniciar Sesión</h2>
        
        <form action="comprobar_contraseña.php" method="POST">
            <div class="input-group">
                <label>Correo Institucional:</label>
                <input type="email" name="correo_electronico" placeholder="ejemplo@ucundinamarca.edu.co" required>
            </div>
            
            <div class="input-group">
                <label>Contraseña:</label>
                <input type="password" name="contrasenia_hash" placeholder="Tu contraseña" required>
            </div>
            
            <button type="submit" class="btn-ingresar">Ingresar</button>
        </form>

        <p class="footer-text">
            ¿No tienes cuenta? <a href="registro.html">Crear cuenta</a>
        </p>
    </div>

</body>
</html>
